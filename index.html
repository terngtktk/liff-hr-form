<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มขออัตรากำลังบุคลากร (HR Recruitment)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary-color: #ee5803;
            --primary-hover: #cf4d02;
            --bg-color: #ffffff; /* Clean White Background */
            --text-main: #1a1a1a;
            --text-sub: #546e7a;
            --border-color: #e0e0e0;
        }

        body { 
            font-family: 'Prompt', sans-serif; 
            padding: 0; 
            margin: 0;
            background-color: var(--bg-color); 
            color: var(--text-main);
            display: flex;
            justify-content: center;
        }

        .container { 
            background: #fff; 
            padding: 40px 20px; 
            width: 100%;
            max-width: 480px; 
            box-sizing: border-box;
        }

        h2 { 
            color: var(--primary-color); 
            text-align: center; 
            font-size: 24px; 
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 35px;
            letter-spacing: 0.5px;
        }

        .form-group {
            position: relative;
            margin-bottom: 25px;
        }

        /* Modern Floating Label Style */
        input, textarea, select { 
            width: 100%; 
            padding: 12px 10px; 
            border: none; 
            border-bottom: 2px solid var(--border-color); 
            border-radius: 0; 
            box-sizing: border-box; 
            font-family: 'Prompt', sans-serif;
            font-size: 15px;
            color: var(--text-main);
            background-color: transparent;
            transition: border-color 0.3s ease;
        }

        select {
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23546e7a' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 10px center;
            padding-right: 30px;
        }

        label { 
            font-weight: 400; 
            font-size: 15px; 
            color: var(--text-sub); 
            position: absolute;
            left: 10px;
            top: 12px;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        /* Maximize Orange Effect on Input focus */
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-bottom-color: var(--primary-color);
        }

        /* Floating label when focused or has content */
        input:focus + label, 
        input:not(:placeholder-shown) + label,
        textarea:focus + label,
        textarea:not(:placeholder-shown) + label,
        select:focus + label,
        select:valid + label {
            top: -18px;
            left: 0;
            font-size: 12px;
            color: var(--primary-color);
            font-weight: 500;
        }
        
        /* Modern Select Option styling for more orange */
        select {
            accent-color: var(--primary-color); /* Chrome/Edge/Firefox modern selection color */
        }

        textarea {
            resize: vertical;
            min-height: 70px;
        }

        button { 
            width: 100%; 
            padding: 16px; 
            background-color: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 50px; /* Modern Rounded Button */
            font-size: 17px; 
            font-weight: 600; 
            font-family: 'Prompt', sans-serif;
            margin-top: 20px; 
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(238, 88, 3, 0.3); /* Soft Orange Glow */
        }

        button:hover { 
            background-color: var(--primary-hover); 
            box-shadow: 0 8px 25px rgba(238, 88, 3, 0.4);
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(1px);
            box-shadow: 0 3px 10px rgba(238, 88, 3, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ฟอร์มแจ้งความต้องการบุคลากร</h2>
    <form id="recruitmentForm">
        
        <div class="form-group">
            <input type="text" id="job_title_and_level" placeholder=" " required>
            <label>1. ชื่อตำแหน่ง และ ระดับ (เช่น Senior Data Analyst)</label>
        </div>

        <div class="form-group">
            <textarea id="key_responsibilities" rows="3" placeholder=" " required></textarea>
            <label>2. รายละเอียดงานหลัก (ขอบเขตงานที่รับผิดชอบ)</label>
        </div>

        <div class="form-group">
            <textarea id="required_skills" rows="2" placeholder=" " required></textarea>
            <label>3. ทักษะที่จำเป็น (เช่น Python, SQL, การสื่อสาร)</label>
        </div>

        <div class="form-group">
            <input type="text" id="experience_and_age" placeholder=" " required>
            <label>4. ประสบการณ์ & ช่วงอายุ (เช่น ประสบการณ์ 3 ปี+, อายุ 25-35 ปี)</label>
        </div>

        <div class="form-group">
            <input type="text" id="expected_join_date" placeholder=" " required>
            <label>5. วันที่คาดหวังให้เริ่มงาน (เช่น ด่วนที่สุด หรือ ภายในเดือนหน้า)</label>
        </div>

        <div class="form-group">
            <select id="employment_type" required>
                <option value="" disabled selected hidden></option>
                <option value="พนักงานประจำ (Full-time)">พนักงานประจำ (Full-time)</option>
                <option value="พนักงานสัญญาจ้าง (Contract)">พนักงานสัญญาจ้าง (Contract)</option>
                <option value="นักศึกษาฝึกงาน (Intern)">นักศึกษาฝึกงาน (Intern)</option>
            </select>
            <label>6. ประเภทการจ้างงาน</label>
        </div>

        <div class="form-group">
            <textarea id="must_have_nice_to_have_skills" rows="2" placeholder=" " required></textarea>
            <label>7. ทักษะที่ต้องมี vs พิจารณาพิเศษ</label>
        </div>

        <div class="form-group">
            <input type="text" id="work_arrangement_location" placeholder=" " required>
            <label>8. รูปแบบการทำงาน & สถานที่ (เช่น Hybrid สนญ. นนทบุรี)</label>
        </div>

        <div class="form-group">
            <input type="text" id="salary_range" placeholder=" " required>
            <label>9. ช่วงเงินเดือน (งบประมาณที่อนุมัติ)</label>
        </div>

        <div class="form-group">
            <input type="text" id="department" placeholder=" " required>
            <label>10. แผนก / บริษัทในเครือ (เช่น HRIS / บริษัท JAS)</label>
        </div>

        <button type="button" onclick="submitForm()">ส่งข้อมูลให้ HR</button>
    </form>
</div>

<script>
    // === จุดที่ตั้งค่า URL เรียบร้อยแล้ว (Preserved from terngtk's version) ===
    const myLiffId = "2010185869-3ExXv1pe"; 
    const n8nWebhookUrl = "https://aekkasart.app.n8n.cloud/webhook/hr-recruitment-liff"; 

    liff.init({ liffId: myLiffId }).then(() => {
        if (!liff.isLoggedIn()) { liff.login(); }
    }).catch(err => console.error("LIFF Init Error", err));

    async function submitForm() {
        // เปลี่ยนข้อความปุ่มและปิดการกดซ้ำระหว่างโหลด
        const submitBtn = document.querySelector('button');
        const originalText = submitBtn.innerText;
        submitBtn.innerText = "กำลังส่งข้อมูล...";
        submitBtn.disabled = true;

        try {
            const profile = await liff.getProfile();
            const formData = {
                line_user_id: profile.userId,
                job_title_and_level: document.getElementById("job_title_and_level").value,
                key_responsibilities: document.getElementById("key_responsibilities").value,
                required_skills: document.getElementById("required_skills").value,
                experience_and_age: document.getElementById("experience_and_age").value,
                expected_join_date: document.getElementById("expected_join_date").value,
                employment_type: document.getElementById("employment_type").value,
                must_have_nice_to_have_skills: document.getElementById("must_have_nice_to_have_skills").value,
                work_arrangement_location: document.getElementById("work_arrangement_location").value,
                salary_range: document.getElementById("salary_range").value,
                department: document.getElementById("department").value
            };

            const response = await fetch(n8nWebhookUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                alert("ส่งข้อมูลเรียบร้อย ระบบ AI กำลังตรวจสอบให้ค่ะ!");
                liff.closeWindow();
            } else {
                alert("เกิดข้อผิดพลาดในการส่งข้อมูล");
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        } catch (error) {
            console.error("Error", error);
            alert("ไม่สามารถดำเนินการได้ กรุณาลองใหม่อีกครั้ง");
            submitBtn.innerText = originalText;
            submitBtn.disabled = false;
        }
    }
</script>
</body>
</html>
